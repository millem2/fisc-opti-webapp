stages:
  - quality
  - release
  - deploy

variables:
  IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# ── Type-check ────────────────────────────────────────────────────────────────

typecheck:
  stage: quality
  image: node:20-alpine
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
  before_script:
    - npm ci --legacy-peer-deps --silent
  script:
    - npx tsc --noEmit
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Docker build & push ───────────────────────────────────────────────────────
# NEXT_PUBLIC_API_URL must be set as a CI/CD variable (Settings → CI/CD → Variables)
# to your production backend URL, e.g. https://api-xxx.up.railway.app/api/v1

docker:
  stage: release
  image: docker:26
  services:
    - docker:26-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL -t $IMAGE -t $IMAGE_LATEST .
    - docker push $IMAGE
    - docker push $IMAGE_LATEST
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Deploy to Railway ─────────────────────────────────────────────────────────
# Required CI/CD variables (Settings → CI/CD → Variables):
#   RAILWAY_TOKEN        → project-scoped token from railway.com/account/tokens
#   RAILWAY_SERVICE      → name of your Railway service, e.g. "webapp"
#   NEXT_PUBLIC_API_URL  → production backend URL (also used at Docker build time)

deploy:
  stage: deploy
  image: node:20-alpine
  needs: [docker]
  script:
    - npm install -g @railway/cli --silent
    - railway up --service $RAILWAY_SERVICE --environment production --detach
  environment:
    name: production
    url: $RAILWAY_URL
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
